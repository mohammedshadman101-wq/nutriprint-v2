<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Prawn — curved shrimp shape -->
  <!-- Body curve -->
  <path d="M18 44 Q16 32 22 22 Q30 12 42 14 Q50 18 48 28 Q46 36 40 40 Q32 46 24 46 Q20 46 18 44Z"
        fill="#FF7043" stroke="#E64A19" stroke-width="1.5"/>
  <!-- Tail fan -->
  <path d="M18 44 L12 48 L16 40 Z" fill="#FF8A65" stroke="#E64A19" stroke-width="1"/>
  <path d="M18 44 L10 44 L14 38 Z" fill="#FF8A65" stroke="#E64A19" stroke-width="1"/>
  <!-- Body segments -->
  <path d="M26 42 Q22 36 24 26" stroke="#E64A19" stroke-width="1" opacity="0.5"/>
  <path d="M34 40 Q32 34 34 24" stroke="#E64A19" stroke-width="1" opacity="0.5"/>
  <!-- Head -->
  <circle cx="43" cy="16" r="5" fill="#FF5722" stroke="#E64A19" stroke-width="1"/>
  <!-- Eye -->
  <circle cx="45" cy="14" r="1.5" fill="#212121"/>
  <!-- Antennae -->
  <line x1="46" y1="12" x2="52" y2="8" stroke="#E64A19" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="11" x2="48" y2="6" stroke="#E64A19" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="30" y1="40" x2="26" y2="50" stroke="#FF8A65" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="38" x2="34" y2="50" stroke="#FF8A65" stroke-width="1" stroke-linecap="round"/>
</svg>
