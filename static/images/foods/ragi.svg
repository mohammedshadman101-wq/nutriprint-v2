  <ellipse cx="27" cy="37" rx="4" ry="2.5" fill="rgba(255,255,255,0.14)" transform="rotate(-15,27,37)"/>
  <!-- Stalk -->
  <line x1="32" y1="26" x2="32" y2="16" stroke="#558B2F" stroke-width="2" stroke-linecap="round"/>
  <!-- Grain ear -->
  <ellipse cx="32" cy="12" rx="4" ry="7" fill="#8BC34A" stroke="#558B2F" stroke-width="1"/>
  <circle cx="30" cy="19" r="1.5" fill="#558B2F"/>
  <circle cx="34" cy="22" r="1.5" fill="#558B2F"/>
  <circle cx="30" cy="25" r="1.5" fill="#558B2F"/>
</svg>
