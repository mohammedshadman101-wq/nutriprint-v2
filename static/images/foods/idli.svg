<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Idli — two white steamed cakes on a plate with sambar bowl -->
  <!-- Plate -->
  <ellipse cx="32" cy="50" rx="26" ry="7" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="1.5"/>
  <!-- Sambar small bowl -->
  <ellipse cx="48" cy="38" rx="8" ry="5" fill="#EF6C00" stroke="#E65100" stroke-width="1"/>
  <ellipse cx="48" cy="37" rx="6" ry="3" fill="#FF8F00" opacity="0.7"/>
  <!-- Idli 1 -->
  <ellipse cx="22" cy="42" rx="11" ry="7" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <ellipse cx="22" cy="40" rx="9" ry="5" fill="white"/>
  <!-- Idli 2 -->
  <ellipse cx="36" cy="44" rx="10" ry="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <ellipse cx="36" cy="42" rx="8" ry="4" fill="white"/>
  <!-- Chutney dollop -->
  <ellipse cx="22" cy="39" rx="3" ry="1.5" fill="#4CAF50" opacity="0.8"/>
  <!-- Steam -->
  <path d="M18 36 Q16 31 18 26" stroke="#BDBDBD" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 34 Q22 29 24 24" stroke="#BDBDBD" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
